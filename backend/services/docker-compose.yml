version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: gri_intel
      POSTGRES_USER: gri_service
      POSTGRES_PASSWORD: gri_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  data-service:
    build:
      context: ./data-service
    env_file:
      - ./data-service/.env
    depends_on:
      - postgres
    ports:
      - "8001:8001"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001"]

volumes:
  pgdata:
